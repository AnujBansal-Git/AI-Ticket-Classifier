services:
  - type: web
    name: ai-ticket-api
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-classifier-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ticket-classifier-redis
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

  - type: worker
    name: ai-ticket-worker
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.tasks worker --loglevel=info --concurrency=1
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-classifier-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ticket-classifier-redis
          property: connectionString

      - key: SECRET_KEY
        sync: false

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

databases:
  - name: ticket-classifier-db

keyvalue:
  - name: ticket-classifier-redis